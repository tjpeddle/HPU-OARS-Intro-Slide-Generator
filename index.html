<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HPU OARS Intro Slide - Simple & Clean</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: #1a1f2e;
            padding: 20px;
        }
        
        .controls {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 900px;
            margin: 0 auto 30px auto;
        }
        
        .controls h2 {
            color: #330072;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-weight: 600;
            color: #330072;
            margin-bottom: 8px;
        }
        
        .form-group input[type="text"],
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #9678D3;
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Outfit', sans-serif;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }
        
        .btn {
            background: #330072;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-right: 10px;
            margin-top: 10px;
        }
        
        .btn:hover {
            background: #9678D3;
        }
        
        .btn-download {
            background: #E87D0D;
        }
        
        .preview-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
        }
        
        #previewCanvas {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        
        #exportCanvas {
            display: none;
        }
    </style>
</head>
<body>
    <div class="controls">
        <h2>🎬 HPU OARS Intro Slide Generator</h2>
        <p style="color: #666; margin-bottom: 25px;">Simple, clean intro slides for your videos</p>
        
        <div class="form-group">
            <label>University Name</label>
            <input type="text" id="uniName" value="HIGH POINT UNIVERSITY">
        </div>
        
        <div class="form-group">
            <label>Department Name</label>
            <input type="text" id="deptName" value="Office of Accessibility Resources and Services">
        </div>
        
        <div class="form-group">
            <label>Tutorial Title</label>
            <input type="text" id="tutorialTitle" value="CAA Video Tutorial">
        </div>
        
        <div class="form-group">
            <label>Subtitle (optional)</label>
            <textarea id="subtitle" placeholder="Leave blank for no subtitle"></textarea>
        </div>
        
        <button class="btn btn-download" onclick="downloadSlide()">📥 Download PNG (1920x1080)</button>
    </div>
    
    <div class="preview-container">
        <canvas id="previewCanvas" width="1920" height="1080"></canvas>
    </div>
    
    <canvas id="exportCanvas" width="1920" height="1080"></canvas>
    
    <script>
        const previewCanvas = document.getElementById('previewCanvas');
        const exportCanvas = document.getElementById('exportCanvas');
        const previewCtx = previewCanvas.getContext('2d');
        const exportCtx = exportCanvas.getContext('2d');
        
        function drawSlide(ctx) {
            const width = 1920;
            const height = 1080;
            
            // Get values
            const uniName = document.getElementById('uniName').value || 'HIGH POINT UNIVERSITY';
            const deptName = document.getElementById('deptName').value || 'Office of Accessibility Resources and Services';
            const tutorialTitle = document.getElementById('tutorialTitle').value || 'Interactive Video Tutorial';
            const subtitle = document.getElementById('subtitle').value;
            
            // Clear canvas
            ctx.clearRect(0, 0, width, height);
            
            // Purple gradient background
            const gradient = ctx.createLinearGradient(0, 0, width, height);
            gradient.addColorStop(0, '#330072');
            gradient.addColorStop(1, '#9678D3');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
            
            // Decorative circles
            ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.beginPath();
            ctx.arc(width - 200, -200, 600, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.beginPath();
            ctx.arc(-100, height + 100, 400, 0, Math.PI * 2);
            ctx.fill();
            
            // White content box - CENTERED VERTICALLY
            const boxX = 160;
            const boxY = 140;
            const boxWidth = 1600;
            const boxHeight = 800;
            const boxRadius = 32;
            
            ctx.fillStyle = 'rgba(255, 255, 255, 0.98)';
            ctx.shadowColor = 'rgba(0, 0, 0, 0.4)';
            ctx.shadowBlur = 60;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 20;
            
            // Draw rounded rectangle
            ctx.beginPath();
            ctx.moveTo(boxX + boxRadius, boxY);
            ctx.lineTo(boxX + boxWidth - boxRadius, boxY);
            ctx.quadraticCurveTo(boxX + boxWidth, boxY, boxX + boxWidth, boxY + boxRadius);
            ctx.lineTo(boxX + boxWidth, boxY + boxHeight - boxRadius);
            ctx.quadraticCurveTo(boxX + boxWidth, boxY + boxHeight, boxX + boxWidth - boxRadius, boxY + boxHeight);
            ctx.lineTo(boxX + boxRadius, boxY + boxHeight);
            ctx.quadraticCurveTo(boxX, boxY + boxHeight, boxX, boxY + boxHeight - boxRadius);
            ctx.lineTo(boxX, boxY + boxRadius);
            ctx.quadraticCurveTo(boxX, boxY, boxX + boxRadius, boxY);
            ctx.closePath();
            ctx.fill();
            
            // Reset shadow
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
            
            // Text alignment
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // LAYOUT - properly spaced
            let yPos = 280;
            
            // 1. University Name
            ctx.font = '700 100px Outfit';
            ctx.fillStyle = '#330072';
            ctx.fillText(uniName, width / 2, yPos);
            yPos += 160;  // Good space after uni name
            
            // 2. First Divider
            ctx.fillStyle = '#330072';
            ctx.fillRect(760, yPos, 400, 6);
            yPos += 100;  // Good space after divider
            
            // 3. Department Name
            ctx.font = '500 56px Outfit';
            ctx.fillStyle = '#9678D3';
            ctx.fillText(deptName, width / 2, yPos);
            yPos += 180;  // Big space before second divider
            
            // 4. Second Divider
            ctx.fillStyle = '#e0d4f0';
            ctx.fillRect(340, yPos, 1240, 3);
            yPos += 100;  // Good space after divider
            
            // 5. Tutorial Title
            ctx.font = '600 70px Outfit';
            ctx.fillStyle = '#330072';
            ctx.fillText(tutorialTitle, width / 2, yPos);
            
            // 6. Subtitle (if exists)
            if (subtitle && subtitle.trim()) {
                yPos += 110;
                ctx.font = '400 40px Outfit';
                ctx.fillStyle = '#666666';
                
                // Simple word wrap
                const maxWidth = 1400;
                const words = subtitle.split(' ');
                let line = '';
                const lines = [];
                
                words.forEach(word => {
                    const testLine = line + word + ' ';
                    const metrics = ctx.measureText(testLine);
                    if (metrics.width > maxWidth && line !== '') {
                        lines.push(line);
                        line = word + ' ';
                    } else {
                        line = testLine;
                    }
                });
                lines.push(line);
                
                lines.forEach((line, index) => {
                    ctx.fillText(line.trim(), width / 2, yPos + (index * 60));
                });
            }
        }
        
        function updateSlide() {
            drawSlide(previewCtx);
        }
        
        function downloadSlide() {
            // Draw to export canvas
            drawSlide(exportCtx);
            
            // Convert to blob and download
            exportCanvas.toBlob(function(blob) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'hpu-oars-intro-slide.png';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                alert('✅ Slide downloaded at 1920x1080! Ready for Clipchamp!');
            });
        }
        
        // Update on any input change
        document.querySelectorAll('input, textarea').forEach(input => {
            input.addEventListener('input', updateSlide);
        });
        
        // Initial draw
        updateSlide();
    </script>
</body>
</html>
