<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HPU OARS Intro Slide Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: #1a1f2e;
            padding: 20px;
            overflow-x: hidden;
        }
        
        .controls {
            background: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            max-width: 1400px;
            margin: 0 auto 30px auto;
            max-height: 500px;
            overflow-y: auto;
        }
        
        .controls h2 {
            color: #330072;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }
        
        .controls h3 {
            color: #330072;
            margin: 25px 0 15px 0;
            font-size: 1.2rem;
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
        }
        
        .controls h3:first-of-type {
            border-top: none;
            padding-top: 0;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-weight: 600;
            color: #330072;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        
        .form-group input[type="text"],
        .form-group input[type="number"],
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #9678D3;
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Outfit', sans-serif;
        }
        
        .form-group input[type="range"] {
            width: calc(100% - 80px);
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }
        
        .color-input-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .color-input-group input[type="color"] {
            width: 60px;
            height: 40px;
            border: 2px solid #9678D3;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .color-input-group input[type="text"] {
            flex: 1;
        }
        
        .range-display {
            display: inline-block;
            min-width: 70px;
            color: #666;
            font-weight: 600;
            margin-left: 10px;
        }
        
        .btn {
            background: #330072;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-right: 10px;
            margin-top: 10px;
        }
        
        .btn:hover {
            background: #9678D3;
        }
        
        .btn-secondary {
            background: #E87D0D;
        }
        
        .btn-reset {
            background: #666;
        }
        
        /* Canvas container */
        .canvas-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin: 40px auto;
        }
        
        #previewCanvas {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        
        /* Hidden canvas for full-size rendering */
        #exportCanvas {
            display: none;
        }
    </style>
</head>
<body>
    <div class="controls">
        <h2>🎬 HPU OARS Intro Slide Generator</h2>
        <p style="color: #666; margin-bottom: 20px;">Customize every element! Changes update in real-time.</p>
        
        <h3>🏛️ University Name</h3>
        
        <div class="form-group">
            <label>Text</label>
            <input type="text" id="uniNameText" value="HIGH POINT UNIVERSITY">
        </div>
        
        <div class="form-group">
            <label>Font Size</label>
            <input type="range" id="uniNameSize" min="60" max="150" step="1" value="100">
            <span class="range-display" id="uniNameSizeDisplay">100px</span>
        </div>
        
        <div class="form-group">
            <label>Color</label>
            <div class="color-input-group">
                <input type="color" id="uniNameColor" value="#330072">
                <input type="text" id="uniNameColorText" value="#330072">
            </div>
        </div>
        
        <h3>➖ Divider Line</h3>
        
        <div class="form-group">
            <label>Width (pixels)</label>
            <input type="range" id="dividerWidth" min="200" max="800" step="10" value="400">
            <span class="range-display" id="dividerWidthDisplay">400px</span>
        </div>
        
        <div class="form-group">
            <label>Thickness (pixels)</label>
            <input type="range" id="dividerHeight" min="2" max="12" step="1" value="6">
            <span class="range-display" id="dividerHeightDisplay">6px</span>
        </div>
        
        <div class="form-group">
            <label>Color</label>
            <div class="color-input-group">
                <input type="color" id="dividerColor" value="#330072">
                <input type="text" id="dividerColorText" value="#330072">
            </div>
        </div>
        
        <h3>🏢 Department Name</h3>
        
        <div class="form-group">
            <label>Text</label>
            <input type="text" id="deptText" value="Office of Accessibility Resources and Services">
        </div>
        
        <div class="form-group">
            <label>Font Size</label>
            <input type="range" id="deptSize" min="30" max="90" step="1" value="56">
            <span class="range-display" id="deptSizeDisplay">56px</span>
        </div>
        
        <div class="form-group">
            <label>Color</label>
            <div class="color-input-group">
                <input type="color" id="deptColor" value="#9678D3">
                <input type="text" id="deptColorText" value="#9678D3">
            </div>
        </div>
        
        <h3>🔤 OARS</h3>
        
        <div class="form-group">
            <label>Text</label>
            <input type="text" id="oarsText" value="OARS">
        </div>
        
        <div class="form-group">
            <label>Font Size</label>
            <input type="range" id="oarsSize" min="20" max="80" step="1" value="40">
            <span class="range-display" id="oarsSizeDisplay">40px</span>
        </div>
        
        <div class="form-group">
            <label>Color</label>
            <div class="color-input-group">
                <input type="color" id="oarsColor" value="#330072">
                <input type="text" id="oarsColorText" value="#330072">
            </div>
        </div>
        
        <div class="form-group">
            <label>Letter Spacing (pixels)</label>
            <input type="range" id="oarsSpacing" min="0" max="20" step="1" value="8">
            <span class="range-display" id="oarsSpacingDisplay">8px</span>
        </div>
        
        <h3>📝 Tutorial Title</h3>
        
        <div class="form-group">
            <label>Title Text</label>
            <input type="text" id="tutorialTitle" value="CAA Video Tutorial">
        </div>
        
        <div class="form-group">
            <label>Font Size</label>
            <input type="range" id="titleSize" min="40" max="100" step="1" value="70">
            <span class="range-display" id="titleSizeDisplay">70px</span>
        </div>
        
        <div class="form-group">
            <label>Color</label>
            <div class="color-input-group">
                <input type="color" id="titleColor" value="#330072">
                <input type="text" id="titleColorText" value="#330072">
            </div>
        </div>
        
        <h3>📄 Tutorial Subtitle (Optional)</h3>
        
        <div class="form-group">
            <label>Subtitle Text</label>
            <textarea id="tutorialSubtitle" placeholder="Leave blank for no subtitle"></textarea>
        </div>
        
        <div class="form-group">
            <label>Font Size</label>
            <input type="range" id="subtitleSize" min="20" max="60" step="1" value="40">
            <span class="range-display" id="subtitleSizeDisplay">40px</span>
        </div>
        
        <div class="form-group">
            <label>Color</label>
            <div class="color-input-group">
                <input type="color" id="subtitleColor" value="#666666">
                <input type="text" id="subtitleColorText" value="#666666">
            </div>
        </div>
        
        <div style="margin-top: 30px; padding-top: 20px; border-top: 3px solid #f0f0f0;">
            <button class="btn btn-reset" onclick="resetDefaults()">↩️ Reset Defaults</button>
            <button class="btn btn-secondary" onclick="downloadSlide()">📥 Download PNG (1920x1080)</button>
        </div>
    </div>
    
    <div class="canvas-container">
        <canvas id="previewCanvas" width="1920" height="1080"></canvas>
    </div>
    
    <canvas id="exportCanvas" width="1920" height="1080"></canvas>
    
    <script>
        const previewCanvas = document.getElementById('previewCanvas');
        const exportCanvas = document.getElementById('exportCanvas');
        const previewCtx = previewCanvas.getContext('2d');
        const exportCtx = exportCanvas.getContext('2d');
        
        function drawSlide(ctx) {
            const width = 1920;
            const height = 1080;
            
            // Clear canvas
            ctx.clearRect(0, 0, width, height);
            
            // Draw purple gradient background
            const gradient = ctx.createLinearGradient(0, 0, width, height);
            gradient.addColorStop(0, '#330072');
            gradient.addColorStop(1, '#9678D3');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
            
            // Draw decorative circles
            ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.beginPath();
            ctx.arc(width - 200, -200, 600, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.beginPath();
            ctx.arc(-100, height + 100, 400, 0, Math.PI * 2);
            ctx.fill();
            
            // Draw white content box
            const boxX = 160;
            const boxY = 150;
            const boxWidth = 1600;
            const boxHeight = 780;
            const boxRadius = 32;
            
            ctx.fillStyle = 'rgba(255, 255, 255, 0.98)';
            ctx.shadowColor = 'rgba(0, 0, 0, 0.4)';
            ctx.shadowBlur = 60;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 20;
            
            ctx.beginPath();
            ctx.moveTo(boxX + boxRadius, boxY);
            ctx.lineTo(boxX + boxWidth - boxRadius, boxY);
            ctx.quadraticCurveTo(boxX + boxWidth, boxY, boxX + boxWidth, boxY + boxRadius);
            ctx.lineTo(boxX + boxWidth, boxY + boxHeight - boxRadius);
            ctx.quadraticCurveTo(boxX + boxWidth, boxY + boxHeight, boxX + boxWidth - boxRadius, boxY + boxHeight);
            ctx.lineTo(boxX + boxRadius, boxY + boxHeight);
            ctx.quadraticCurveTo(boxX, boxY + boxHeight, boxX, boxY + boxHeight - boxRadius);
            ctx.lineTo(boxX, boxY + boxRadius);
            ctx.quadraticCurveTo(boxX, boxY, boxX + boxRadius, boxY);
            ctx.closePath();
            ctx.fill();
            
            // Reset shadow
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
            
            // Get values
            const uniText = document.getElementById('uniNameText').value || 'HIGH POINT UNIVERSITY';
            const uniSize = parseInt(document.getElementById('uniNameSize').value);
            const uniColor = document.getElementById('uniNameColor').value;
            
            const divWidth = parseInt(document.getElementById('dividerWidth').value);
            const divHeight = parseInt(document.getElementById('dividerHeight').value);
            const divColor = document.getElementById('dividerColor').value;
            
            const deptText = document.getElementById('deptText').value || 'Office of Accessibility Resources and Services';
            const deptSize = parseInt(document.getElementById('deptSize').value);
            const deptColor = document.getElementById('deptColor').value;
            
            const oarsText = document.getElementById('oarsText').value || 'OARS';
            const oarsSize = parseInt(document.getElementById('oarsSize').value);
            const oarsColor = document.getElementById('oarsColor').value;
            const oarsSpacing = parseInt(document.getElementById('oarsSpacing').value);
            
            const titleText = document.getElementById('tutorialTitle').value || 'Interactive Video Tutorial';
            const titleSize = parseInt(document.getElementById('titleSize').value);
            const titleColor = document.getElementById('titleColor').value;
            
            const subtitleText = document.getElementById('tutorialSubtitle').value;
            const subtitleSize = parseInt(document.getElementById('subtitleSize').value);
            const subtitleColor = document.getElementById('subtitleColor').value;
            
            let yPos = 280;
            
            // Draw university name
            ctx.font = `700 ${uniSize}px Outfit, sans-serif`;
            ctx.fillStyle = uniColor;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(uniText, width / 2, yPos);
            yPos += uniSize + 40;
            
            // Draw divider
            const divX = (width - divWidth) / 2;
            ctx.fillStyle = divColor;
            ctx.fillRect(divX, yPos, divWidth, divHeight);
            yPos += divHeight + 50;
            
            // Draw department name
            ctx.font = `500 ${deptSize}px Outfit, sans-serif`;
            ctx.fillStyle = deptColor;
            ctx.fillText(deptText, width / 2, yPos);
            yPos += deptSize + 30;
            
            // Draw OARS with letter spacing
            ctx.font = `600 ${oarsSize}px Outfit, sans-serif`;
            ctx.fillStyle = oarsColor;
            
            if (oarsSpacing > 0) {
                // Manual letter spacing
                const letters = oarsText.split('');
                const totalWidth = letters.reduce((sum, letter) => sum + ctx.measureText(letter).width, 0) + (oarsSpacing * (letters.length - 1));
                let xPos = (width - totalWidth) / 2;
                
                letters.forEach(letter => {
                    ctx.fillText(letter, xPos + ctx.measureText(letter).width / 2, yPos);
                    xPos += ctx.measureText(letter).width + oarsSpacing;
                });
            } else {
                ctx.fillText(oarsText, width / 2, yPos);
            }
            yPos += oarsSize + 70;
            
            // Draw separator line
            ctx.strokeStyle = 'rgba(51, 0, 114, 0.15)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(300, yPos);
            ctx.lineTo(width - 300, yPos);
            ctx.stroke();
            yPos += 60;
            
            // Draw tutorial title
            ctx.font = `600 ${titleSize}px Outfit, sans-serif`;
            ctx.fillStyle = titleColor;
            ctx.fillText(titleText, width / 2, yPos);
            yPos += titleSize + 40;
            
            // Draw subtitle if exists
            if (subtitleText) {
                ctx.font = `400 ${subtitleSize}px Outfit, sans-serif`;
                ctx.fillStyle = subtitleColor;
                
                // Word wrap for subtitle
                const maxWidth = 1400;
                const words = subtitleText.split(' ');
                let line = '';
                const lines = [];
                
                words.forEach(word => {
                    const testLine = line + word + ' ';
                    const metrics = ctx.measureText(testLine);
                    if (metrics.width > maxWidth && line !== '') {
                        lines.push(line);
                        line = word + ' ';
                    } else {
                        line = testLine;
                    }
                });
                lines.push(line);
                
                lines.forEach((line, index) => {
                    ctx.fillText(line.trim(), width / 2, yPos + (index * subtitleSize * 1.4));
                });
            }
        }
        
        function updateSlide() {
            // Update all display values
            document.getElementById('uniNameSizeDisplay').textContent = document.getElementById('uniNameSize').value + 'px';
            document.getElementById('uniNameColorText').value = document.getElementById('uniNameColor').value;
            
            document.getElementById('dividerWidthDisplay').textContent = document.getElementById('dividerWidth').value + 'px';
            document.getElementById('dividerHeightDisplay').textContent = document.getElementById('dividerHeight').value + 'px';
            document.getElementById('dividerColorText').value = document.getElementById('dividerColor').value;
            
            document.getElementById('deptSizeDisplay').textContent = document.getElementById('deptSize').value + 'px';
            document.getElementById('deptColorText').value = document.getElementById('deptColor').value;
            
            document.getElementById('oarsSizeDisplay').textContent = document.getElementById('oarsSize').value + 'px';
            document.getElementById('oarsColorText').value = document.getElementById('oarsColor').value;
            document.getElementById('oarsSpacingDisplay').textContent = document.getElementById('oarsSpacing').value + 'px';
            
            document.getElementById('titleSizeDisplay').textContent = document.getElementById('titleSize').value + 'px';
            document.getElementById('titleColorText').value = document.getElementById('titleColor').value;
            
            document.getElementById('subtitleSizeDisplay').textContent = document.getElementById('subtitleSize').value + 'px';
            document.getElementById('subtitleColorText').value = document.getElementById('subtitleColor').value;
            
            // Redraw canvas
            drawSlide(previewCtx);
        }
        
        function resetDefaults() {
            document.getElementById('uniNameText').value = 'HIGH POINT UNIVERSITY';
            document.getElementById('uniNameSize').value = 100;
            document.getElementById('uniNameColor').value = '#330072';
            
            document.getElementById('dividerWidth').value = 400;
            document.getElementById('dividerHeight').value = 6;
            document.getElementById('dividerColor').value = '#330072';
            
            document.getElementById('deptText').value = 'Office of Accessibility Resources and Services';
            document.getElementById('deptSize').value = 56;
            document.getElementById('deptColor').value = '#9678D3';
            
            document.getElementById('oarsText').value = 'OARS';
            document.getElementById('oarsSize').value = 40;
            document.getElementById('oarsColor').value = '#330072';
            document.getElementById('oarsSpacing').value = 8;
            
            document.getElementById('tutorialTitle').value = 'Interactive Video Tutorial';
            document.getElementById('titleSize').value = 70;
            document.getElementById('titleColor').value = '#330072';
            
            document.getElementById('tutorialSubtitle').value = '';
            document.getElementById('subtitleSize').value = 40;
            document.getElementById('subtitleColor').value = '#666666';
            
            updateSlide();
        }
        
        function downloadSlide() {
            // Draw to export canvas at full resolution
            drawSlide(exportCtx);
            
            // Convert to blob and download
            exportCanvas.toBlob(function(blob) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'hpu-oars-intro-slide.png';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                alert('✅ Slide downloaded at 1920x1080!');
            });
        }
        
        // Add event listeners for real-time updates
        const allInputs = document.querySelectorAll('input, textarea');
        allInputs.forEach(input => {
            input.addEventListener('input', updateSlide);
        });
        
        // Initialize
        updateSlide();
    </script>
</body>
</html>
